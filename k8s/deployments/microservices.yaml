# ── Socket Service ─────────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: socket-service
  namespace: tsn
  labels:
    app: socket-service
spec:
  replicas: 2         # Redis adapter keeps all replicas in sync
  selector:
    matchLabels:
      app: socket-service
  strategy:
    type: RollingUpdate
    rollingUpdate: { maxSurge: 1, maxUnavailable: 0 }
  template:
    metadata:
      labels:
        app: socket-service
    spec:
      containers:
        - name: socket-service
          image: tsn/socket-service:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3006
          env:
            - name: PORT
              value: "3006"
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef: { name: tsn-secrets, key: REDIS_PASSWORD }
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef: { name: tsn-secrets, key: JWT_SECRET }
          envFrom:
            - configMapRef: { name: tsn-config }
          resources:
            requests: { memory: "256Mi", cpu: "150m" }
            limits:   { memory: "512Mi", cpu: "400m" }
          livenessProbe:
            httpGet: { path: /health, port: 3006 }
            initialDelaySeconds: 20
            periodSeconds: 15
          readinessProbe:
            httpGet: { path: /health, port: 3006 }
            initialDelaySeconds: 10
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: socket-service
  namespace: tsn
spec:
  selector:
    app: socket-service
  ports:
    - name: websocket
      port: 3006
      targetPort: 3006
  type: LoadBalancer   # exposed so mobile app can connect directly via WebSocket
