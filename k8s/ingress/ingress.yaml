# Install NGINX ingress first:
# kubectl apply -f https://raw.githubusercontent.com/kubernetes/ingress-nginx/controller-v1.9.4/deploy/static/provider/cloud/deploy.yaml

apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: tsn-ingress
  namespace: tsn
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target:          /
    nginx.ingress.kubernetes.io/proxy-body-size:         "10m"
    nginx.ingress.kubernetes.io/proxy-read-timeout:      "60"
    nginx.ingress.kubernetes.io/proxy-send-timeout:      "60"
    nginx.ingress.kubernetes.io/proxy-connect-timeout:   "60"
    # WebSocket support for Socket.IO
    nginx.ingress.kubernetes.io/proxy-http-version:      "1.1"
    nginx.ingress.kubernetes.io/configuration-snippet: |
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
    # Rate limiting
    nginx.ingress.kubernetes.io/limit-rps:               "50"
    # TLS redirect
    nginx.ingress.kubernetes.io/ssl-redirect:            "true"
    # CORS
    nginx.ingress.kubernetes.io/enable-cors:             "true"
    nginx.ingress.kubernetes.io/cors-allow-origin:       "*"
spec:
  ingressClassName: nginx
  # TLS — replace with your domain
  tls:
    - hosts:
        - api.tsn-cameroon.com
        - socket.tsn-cameroon.com
      secretName: tsn-tls-secret
  rules:
    # REST API traffic → API Gateway
    - host: api.tsn-cameroon.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: api-gateway-service
                port:
                  number: 80
    # WebSocket traffic → Socket Service
    - host: socket.tsn-cameroon.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: socket-service
                port:
                  number: 3006
