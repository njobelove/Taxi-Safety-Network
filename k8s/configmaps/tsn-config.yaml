apiVersion: v1
kind: ConfigMap
metadata:
  name: tsn-config
  namespace: tsn
data:
  NODE_ENV:              "production"
  JWT_EXPIRES_IN:        "7d"
  BCRYPT_ROUNDS:         "12"
  AUTH_SERVICE_URL:      "http://auth-service:3001"
  ALERT_SERVICE_URL:     "http://alert-service:3002"
  LOCATION_SERVICE_URL:  "http://location-service:3003"
  SMS_SERVICE_URL:       "http://sms-service:3004"
  USSD_SERVICE_URL:      "http://ussd-service:3005"
  SOCKET_SERVICE_URL:    "http://socket-service:3006"
  REDIS_URL:             "redis://:$(REDIS_PASSWORD)@redis-service:6379"
  MTN_API_URL:           "https://api.mtn.com/v1/sms"
  ORANGE_API_URL:        "https://api.orange.com/smsmessaging/v1"
  CLUSTER_NAME:          "Cluster0"
  DATABASE:              "tsn_cameroon"
