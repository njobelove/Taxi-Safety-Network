apiVersion: v1
kind: Namespace
metadata:
  name: tsn-cicd
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: jenkins
  namespace: tsn-cicd
spec:
  replicas: 1
  selector:
    matchLabels:
      app: jenkins
  template:
    metadata:
      labels:
        app: jenkins
    spec:
      serviceAccountName: jenkins-sa
      securityContext:
        fsGroup: 1000
        runAsUser: 0
      containers:
        - name: jenkins
          image: jenkins/jenkins:lts-jdk17
          ports:
            - containerPort: 8080   # Web UI
            - containerPort: 50000  # Agent port
          env:
            - name: JAVA_OPTS
              value: "-Xmx2g -Djenkins.install.runSetupWizard=false"
            - name: CASC_JENKINS_CONFIG
              value: /var/jenkins_home/casc.yaml
          volumeMounts:
            - name: jenkins-home
              mountPath: /var/jenkins_home
            - name: docker-sock
              mountPath: /var/run/docker.sock
          resources:
            requests: { memory: "1Gi",  cpu: "500m"  }
            limits:   { memory: "3Gi",  cpu: "1500m" }
          livenessProbe:
            httpGet: { path: /login, port: 8080 }
            initialDelaySeconds: 90
            periodSeconds: 30
          readinessProbe:
            httpGet: { path: /login, port: 8080 }
            initialDelaySeconds: 60
            periodSeconds: 15
      volumes:
        - name: jenkins-home
          emptyDir: {}
        - name: docker-sock
          hostPath:
            path: /var/run/docker.sock
---
apiVersion: v1
kind: Service
metadata:
  name: jenkins-service
  namespace: tsn-cicd
spec:
  selector:
    app: jenkins
  ports:
    - name: web
      port: 8080
      targetPort: 8080
    - name: agent
      port: 50000
      targetPort: 50000
  type: LoadBalancer
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: jenkins-sa
  namespace: tsn-cicd
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: jenkins-cluster-admin
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: cluster-admin
subjects:
  - kind: ServiceAccount
    name: jenkins-sa
    namespace: tsn-cicd
