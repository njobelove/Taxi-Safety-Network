# SonarQube Project Configuration — TSN Taxi Safety Network
sonar.projectKey=tsn-taxi-safety-network
sonar.projectName=Taxi Safety Network
sonar.projectVersion=1.0

# Source directories — all Node.js microservices
sonar.sources=services
sonar.tests=services

# Exclusions
sonar.exclusions=\
  **/node_modules/**,\
  **/coverage/**,\
  **/test-results/**,\
  **/*.test.js,\
  **/*.spec.js,\
  **/dist/**,\
  **/.env*

# Test file patterns
sonar.test.inclusions=\
  **/*.test.js,\
  **/*.spec.js,\
  **/tests/**/*.js

# Coverage reports (generated by Jest with --coverage)
sonar.javascript.lcov.reportPaths=\
  services/auth-service/coverage/lcov.info,\
  services/alert-service/coverage/lcov.info,\
  services/location-service/coverage/lcov.info,\
  services/sms-service/coverage/lcov.info,\
  services/socket-service/coverage/lcov.info

# Test execution report
sonar.testExecutionReportPaths=\
  services/auth-service/test-results/test-results.xml,\
  services/alert-service/test-results/test-results.xml

# Language
sonar.language=js
sonar.sourceEncoding=UTF-8

# Quality Gate settings (configure in SonarQube UI)
# Coverage minimum: 70%
# Duplicated lines: < 10%
# Maintainability rating: A
# Reliability rating: A
# Security rating: A
# New bugs: 0
# New vulnerabilities: 0
