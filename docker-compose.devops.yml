version: '3.9'

# ── TSN DevOps Stack ──────────────────────────────────────────────────────────
# Prometheus  → http://localhost:9090
# Grafana     → http://localhost:3100   admin / tsn_grafana_2024
# Alertmanager→ http://localhost:9093
# Jenkins     → http://localhost:8080   (first-run setup wizard)
# SonarQube   → http://localhost:9000   admin / admin (change on first login)
#
# Run: docker-compose -f docker-compose.devops.yml up -d

networks:
  tsn-devops:
    driver: bridge
  tsn-net:
    external: true       # connects to the main app network

volumes:
  prometheus-data:
  grafana-data:
  alertmanager-data:
  jenkins-data:
  sonarqube-data:
  sonarqube-extensions:
  sonarqube-logs:
  sonarqube-temp:
  postgres-sonar-data:

services:

  # ── Prometheus ──────────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.49.0
    container_name: tsn-prometheus
    restart: unless-stopped
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=30d
      - --web.console.libraries=/etc/prometheus/console_libraries
      - --web.console.templates=/etc/prometheus/consoles
      - --web.enable-lifecycle
      - --web.enable-admin-api
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/prometheus/rules:/etc/prometheus/rules:ro
      - prometheus-data:/prometheus
    networks:
      - tsn-devops
      - tsn-net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9090/-/healthy"]
      interval: 15s
      timeout: 5s
      retries: 5

  # ── Alertmanager ────────────────────────────────────────────────────────────
  alertmanager:
    image: prom/alertmanager:v0.26.0
    container_name: tsn-alertmanager
    restart: unless-stopped
    command:
      - --config.file=/etc/alertmanager/alertmanager.yml
      - --storage.path=/alertmanager
    ports:
      - "9093:9093"
    volumes:
      - ./monitoring/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - alertmanager-data:/alertmanager
    networks:
      - tsn-devops

  # ── Grafana ─────────────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:10.2.3
    container_name: tsn-grafana
    restart: unless-stopped
    ports:
      - "3100:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=tsn_grafana_2024
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_SERVER_DOMAIN=grafana.tsn-cameroon.com
      - GF_SMTP_ENABLED=false
      - GF_ALERTING_ENABLED=true
      - GF_UNIFIED_ALERTING_ENABLED=true
    volumes:
      - grafana-data:/var/lib/grafana
      - ./monitoring/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ./monitoring/grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    networks:
      - tsn-devops
    depends_on:
      - prometheus
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 15s
      timeout: 5s
      retries: 5

  # ── Node Exporter (host metrics) ────────────────────────────────────────────
  node-exporter:
    image: prom/node-exporter:v1.7.0
    container_name: tsn-node-exporter
    restart: unless-stopped
    command:
      - --path.rootfs=/host
      - --collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)
    ports:
      - "9100:9100"
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    networks:
      - tsn-devops

  # ── cAdvisor (Docker container metrics) ────────────────────────────────────
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.47.2
    container_name: tsn-cadvisor
    restart: unless-stopped
    privileged: true
    ports:
      - "8081:8080"
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    networks:
      - tsn-devops

  # ── MongoDB Exporter ────────────────────────────────────────────────────────
  mongodb-exporter:
    image: percona/mongodb_exporter:0.40.0
    container_name: tsn-mongodb-exporter
    restart: unless-stopped
    command:
      - --mongodb.uri=mongodb://tsn_admin:tsn_secret_2024@mongo:27017/tsn_cameroon?authSource=admin
      - --collect-all
    ports:
      - "9216:9216"
    networks:
      - tsn-devops
      - tsn-net

  # ── Redis Exporter ──────────────────────────────────────────────────────────
  redis-exporter:
    image: oliver006/redis_exporter:v1.55.0
    container_name: tsn-redis-exporter
    restart: unless-stopped
    environment:
      - REDIS_ADDR=redis://redis:6379
      - REDIS_PASSWORD=tsn_redis_2024
    ports:
      - "9121:9121"
    networks:
      - tsn-devops
      - tsn-net

  # ── Jenkins ─────────────────────────────────────────────────────────────────
  jenkins:
    image: jenkins/jenkins:lts-jdk17
    container_name: tsn-jenkins
    restart: unless-stopped
    privileged: true
    user: root
    ports:
      - "8080:8080"
      - "50000:50000"   # Jenkins agent port
    environment:
      - JAVA_OPTS=-Djenkins.install.runSetupWizard=false
      - JENKINS_ADMIN_ID=admin
      - JENKINS_ADMIN_PASSWORD=tsn_jenkins_2024
    volumes:
      - jenkins-data:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock  # allows Jenkins to run Docker
      - ./cicd/jenkins/plugins.txt:/usr/share/jenkins/ref/plugins.txt:ro
      - ./cicd/jenkins/jenkins.yaml:/var/jenkins_home/casc.yaml:ro
    networks:
      - tsn-devops
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/login"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 60s

  # ── PostgreSQL for SonarQube ────────────────────────────────────────────────
  sonar-postgres:
    image: postgres:15-alpine
    container_name: tsn-sonar-postgres
    restart: unless-stopped
    environment:
      - POSTGRES_USER=sonar
      - POSTGRES_PASSWORD=sonar_password_2024
      - POSTGRES_DB=sonarqube
    volumes:
      - postgres-sonar-data:/var/lib/postgresql/data
    networks:
      - tsn-devops
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sonar -d sonarqube"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── SonarQube ───────────────────────────────────────────────────────────────
  sonarqube:
    image: sonarqube:10.3-community
    container_name: tsn-sonarqube
    restart: unless-stopped
    depends_on:
      sonar-postgres:
        condition: service_healthy
    ports:
      - "9000:9000"
    environment:
      - SONAR_JDBC_URL=jdbc:postgresql://sonar-postgres:5432/sonarqube
      - SONAR_JDBC_USERNAME=sonar
      - SONAR_JDBC_PASSWORD=sonar_password_2024
      - SONAR_ES_BOOTSTRAP_CHECKS_DISABLE=true
    volumes:
      - sonarqube-data:/opt/sonarqube/data
      - sonarqube-extensions:/opt/sonarqube/extensions
      - sonarqube-logs:/opt/sonarqube/logs
      - sonarqube-temp:/opt/sonarqube/temp
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    networks:
      - tsn-devops
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9000/api/system/status"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 120s
