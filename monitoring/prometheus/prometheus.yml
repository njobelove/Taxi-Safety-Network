global:
  scrape_interval:     15s   # how often to scrape
  evaluation_interval: 15s   # how often to evaluate rules
  external_labels:
    cluster: tsn-cameroon
    environment: production

# Alertmanager config
alerting:
  alertmanagers:
    - static_configs:
        - targets: ['alertmanager:9093']

# Alert rules files
rule_files:
  - /etc/prometheus/rules/*.yml

# ── Scrape targets ────────────────────────────────────────────────────────────
scrape_configs:

  # Prometheus itself
  - job_name: prometheus
    static_configs:
      - targets: ['localhost:9090']

  # Host machine metrics
  - job_name: node-exporter
    static_configs:
      - targets: ['node-exporter:9100']
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: tsn-host

  # Docker container metrics
  - job_name: cadvisor
    static_configs:
      - targets: ['cadvisor:8080']
    metric_relabel_configs:
      - source_labels: [container_label_service]
        target_label: service

  # MongoDB metrics
  - job_name: mongodb
    static_configs:
      - targets: ['mongodb-exporter:9216']
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: tsn-mongodb

  # Redis metrics
  - job_name: redis
    static_configs:
      - targets: ['redis-exporter:9121']
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: tsn-redis

  # ── TSN Microservices (each exposes /metrics via prom-client) ────────────────
  - job_name: tsn-api-gateway
    metrics_path: /metrics
    scrape_interval: 10s
    static_configs:
      - targets: ['api-gateway:3000']
        labels:
          service: api-gateway
          team: tsn-backend

  - job_name: tsn-auth-service
    metrics_path: /metrics
    scrape_interval: 10s
    static_configs:
      - targets: ['auth-service:3001']
        labels:
          service: auth-service

  - job_name: tsn-alert-service
    metrics_path: /metrics
    scrape_interval: 10s
    static_configs:
      - targets: ['alert-service:3002']
        labels:
          service: alert-service

  - job_name: tsn-location-service
    metrics_path: /metrics
    scrape_interval: 10s
    static_configs:
      - targets: ['location-service:3003']
        labels:
          service: location-service

  - job_name: tsn-sms-service
    metrics_path: /metrics
    scrape_interval: 10s
    static_configs:
      - targets: ['sms-service:3004']
        labels:
          service: sms-service

  - job_name: tsn-socket-service
    metrics_path: /metrics
    scrape_interval: 10s
    static_configs:
      - targets: ['socket-service:3006']
        labels:
          service: socket-service

  # ── Kubernetes pod discovery (when deployed on K8s) ──────────────────────────
  - job_name: kubernetes-pods
    kubernetes_sd_configs:
      - role: pod
        namespaces:
          names: [tsn]
    relabel_configs:
      # Only scrape pods with annotation prometheus.io/scrape: "true"
      - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
        action: keep
        regex: "true"
      - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_path]
        action: replace
        target_label: __metrics_path__
        regex: (.+)
      - source_labels: [__address__, __meta_kubernetes_pod_annotation_prometheus_io_port]
        action: replace
        regex: ([^:]+)(?::\d+)?;(\d+)
        replacement: $1:$2
        target_label: __address__
      - source_labels: [__meta_kubernetes_namespace]
        target_label: namespace
      - source_labels: [__meta_kubernetes_pod_name]
        target_label: pod
      - source_labels: [__meta_kubernetes_pod_label_app]
        target_label: service
