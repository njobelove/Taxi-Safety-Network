groups:
  # ── TSN Service Health Alerts ────────────────────────────────────────────────
  - name: tsn.services
    interval: 30s
    rules:

      # Service is completely down
      - alert: TSNServiceDown
        expr: up{job=~"tsn-.*"} == 0
        for: 1m
        labels:
          severity: critical
          team: tsn-backend
        annotations:
          summary: "🚨 TSN Service DOWN: {{ $labels.service }}"
          description: "Service {{ $labels.service }} has been unreachable for more than 1 minute."

      # High error rate
      - alert: TSNHighErrorRate
        expr: |
          rate(http_requests_total{job=~"tsn-.*", status=~"5.."}[5m])
          /
          rate(http_requests_total{job=~"tsn-.*"}[5m]) > 0.05
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "⚠ High error rate on {{ $labels.service }}"
          description: "Error rate is {{ $value | humanizePercentage }} on {{ $labels.service }}"

      # Slow API responses
      - alert: TSNSlowRequests
        expr: |
          histogram_quantile(0.95,
            rate(http_request_duration_ms_bucket{job=~"tsn-.*"}[5m])
          ) > 2000
        for: 3m
        labels:
          severity: warning
        annotations:
          summary: "🐢 Slow responses on {{ $labels.service }}"
          description: "P95 latency is {{ $value }}ms on {{ $labels.service }} (threshold: 2000ms)"

      # Alert service SOS queue spike
      - alert: TSNSOSAlertSpike
        expr: rate(tsn_sos_alerts_total[5m]) > 10
        for: 1m
        labels:
          severity: warning
          team: tsn-operations
        annotations:
          summary: "🆘 High SOS alert rate detected"
          description: "{{ $value }} SOS alerts per second — possible emergency situation in Cameroon network"

  # ── Infrastructure Alerts ──────────────────────────────────────────────────
  - name: tsn.infrastructure
    rules:

      # MongoDB connection issues
      - alert: TSNMongoDBDown
        expr: mongodb_up == 0
        for: 30s
        labels:
          severity: critical
        annotations:
          summary: "🚨 MongoDB is DOWN"
          description: "TSN MongoDB instance is unreachable. All services will fail."

      # MongoDB high connection count
      - alert: TSNMongoDBHighConnections
        expr: mongodb_connections{state="current"} > 200
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "⚠ MongoDB connection count high: {{ $value }}"
          description: "MongoDB has {{ $value }} active connections (threshold: 200)"

      # Redis down
      - alert: TSNRedisDown
        expr: redis_up == 0
        for: 30s
        labels:
          severity: critical
        annotations:
          summary: "🚨 Redis is DOWN"
          description: "Redis is unreachable. Real-time features and pub/sub will fail."

      # High memory usage
      - alert: TSNHighMemory
        expr: |
          (node_memory_MemTotal_bytes - node_memory_MemAvailable_bytes)
          / node_memory_MemTotal_bytes * 100 > 85
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "⚠ High memory usage: {{ $value | humanize }}%"
          description: "Host memory usage is above 85% for 5 minutes"

      # High CPU
      - alert: TSNHighCPU
        expr: |
          100 - (avg by(instance) (rate(node_cpu_seconds_total{mode="idle"}[5m])) * 100) > 80
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "⚠ High CPU usage: {{ $value | humanize }}%"
          description: "CPU usage above 80% for 5 minutes"

      # Disk space
      - alert: TSNDiskSpaceLow
        expr: |
          (node_filesystem_avail_bytes{fstype!="tmpfs"}
          / node_filesystem_size_bytes{fstype!="tmpfs"}) * 100 < 15
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "⚠ Low disk space: {{ $value | humanize }}% remaining"
          description: "Disk space is below 15% on {{ $labels.mountpoint }}"

  # ── Pod Autoscaling Alerts (Kubernetes) ───────────────────────────────────
  - name: tsn.kubernetes
    rules:

      - alert: TSNPodCrashLooping
        expr: rate(kube_pod_container_status_restarts_total{namespace="tsn"}[15m]) > 0
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "🚨 Pod crash-looping: {{ $labels.pod }}"
          description: "Pod {{ $labels.pod }} in namespace tsn is crash-looping"

      - alert: TSNDeploymentReplicasMismatch
        expr: |
          kube_deployment_spec_replicas{namespace="tsn"}
          != kube_deployment_status_available_replicas{namespace="tsn"}
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "⚠ Deployment {{ $labels.deployment }} has replica mismatch"
          description: "Expected {{ $value }} replicas but fewer are available"
