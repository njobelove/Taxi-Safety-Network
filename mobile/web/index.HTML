<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta httpEquiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <meta name="theme-color" content="#d32f2f" />
    <meta name="application-name" content="TSN" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="TSN" />
    <meta name="description" content="Taxi Safety Network - Emergency alert system for taxi drivers in Cameroon" />
    <meta name="mobile-web-app-capable" content="yes" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="apple-touch-icon" href="/favicon.ico" />
    <title>TSN - Taxi Safety Network</title>
    <style>
      html, body, #root {
        width: 100%;
        height: 100%;
        margin: 0;
        padding: 0;
        background-color: #ffffff;
        overflow: hidden;
      }
      #root { display: flex; flex: 1; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script>
      // Dynamically find and load the MaterialIcons font after the page loads
      // Expo hashes the font filenames, so we search for them
      function loadIconFonts() {
        // These are the font families needed by @expo/vector-icons
        const fontFamilies = [
          'MaterialIcons',
          'Ionicons', 
          'FontAwesome5_Solid',
          'FontAwesome5_Regular',
          'FontAwesome5_Brands',
        ];

        // Find all .ttf files loaded by the app bundle
        const links = Array.from(document.querySelectorAll('link[rel="preload"]'));
        const scripts = Array.from(document.querySelectorAll('script[src]'));
        
        // Force reload fonts from the bundle
        fontFamilies.forEach(family => {
          const style = document.createElement('style');
          style.textContent = `
            @font-face {
              font-family: '${family}';
              src: url('/fonts/${family}.ttf') format('truetype');
              font-display: block;
            }
          `;
          document.head.appendChild(style);
        });
      }
      window.addEventListener('load', loadIconFonts);
    </script>
  </body>
</html>
