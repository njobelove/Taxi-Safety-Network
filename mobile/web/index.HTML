<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta httpEquiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />

    <!-- PWA -->
    <meta name="theme-color" content="#d32f2f" />
    <meta name="application-name" content="TSN" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="#d32f2f" />
    <meta name="apple-mobile-web-app-title" content="TSN" />
    <meta name="description" content="Taxi Safety Network - Emergency alert system for taxi drivers in Cameroon" />
    <meta name="mobile-web-app-capable" content="yes" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="apple-touch-icon" href="/favicon.ico" />
    <title>TSN - Taxi Safety Network</title>

    <style>
      /* Force icon fonts to load from bundled assets */
      @font-face {
        font-family: 'MaterialIcons';
        src: url('/assets/MaterialIcons.ttf') format('truetype');
        font-display: block;
        font-weight: normal;
        font-style: normal;
      }
      @font-face {
        font-family: 'Ionicons';
        src: url('/assets/Ionicons.ttf') format('truetype');
        font-display: block;
        font-weight: normal;
        font-style: normal;
      }
      @font-face {
        font-family: 'FontAwesome5_Solid';
        src: url('/assets/FontAwesome5_Solid.ttf') format('truetype');
        font-display: block;
        font-weight: normal;
        font-style: normal;
      }
      @font-face {
        font-family: 'FontAwesome5_Regular';
        src: url('/assets/FontAwesome5_Regular.ttf') format('truetype');
        font-display: block;
        font-weight: normal;
        font-style: normal;
      }

      html, body, #root {
        width: 100%;
        height: 100%;
        margin: 0;
        padding: 0;
        background-color: #d32f2f;
        overflow: hidden;
      }
      #root {
        display: flex;
        flex: 1;
        background-color: #ffffff;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
  </body>
